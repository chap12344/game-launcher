<script>
const win = window.open("about:blank", "_blank");

win.document.write(`
<iframe src="https://your-game-link.com"
style="position:fixed;top:0;left:0;width:100%;height:100%;border:none;">
</iframe>
`);

// try to close (may fail)
setTimeout(() => {
  window.close();
}, 100);

// fallback: wipe the page so it's invisible
setTimeout(() => {
  document.body.innerHTML = "";
}, 150);
</script>
